<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Sach.in — Links Manager</title>
    <meta name="description"
        content="A pristine, minimalist video vault for saving, managing, and syncing links via P2P.">
    <!-- Clean sans-serif fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body class="light-theme">

    <div id="loader" class="loader-overlay hidden">
        <div class="loader-spinner"></div>
        <p class="loader-text">Loading...</p>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon"></div>
                <div class="logo-text-group">
                    <h1>Sach.in</h1>
                </div>
            </div>
            <nav class="header-actions">
                <button id="multiShareBtn" class="btn secondary">Share</button>
                <button id="importBtn" class="btn secondary">Import</button>
                <button id="backupBtn" class="btn secondary">Backup</button>
            </nav>
        </header>

        <!-- Main Content -->
        <main>
            <section class="add-section border-panel">
                <div class="input-group">
                    <input type="url" id="urlInput" placeholder="Paste your link..." autocomplete="off">
                    <button id="addBtn" class="btn primary">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" style="margin-right: 6px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Add
                    </button>
                </div>
            </section>

            <div class="view-controls">
                <button id="gridViewBtn" class="btn icon-btn active" title="Grid View">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                </button>
                <button id="listViewBtn" class="btn icon-btn" title="List View">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                </button>
            </div>

            <div id="linkGrid" class="link-grid">
                <!-- Cards injected here dynamically -->
                <div class="empty-state">
                    <div class="empty-title">Nothing here yet</div>
                    <div class="empty-sub">Add a link to begin.</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Thumbnail Picker Modal -->
    <div id="thumbModal" class="modal-overlay hidden">
        <div class="modal-content border-panel">
            <h2>Select Thumbnail</h2>
            <p id="thumbStatus" class="modal-subtitle"></p>
            <div id="thumbPicker" class="thumb-picker"></div>
            <div class="modal-actions">
                <button id="retryFetchBtn" class="btn secondary">Try Again</button>
                <button id="closeModal" class="btn secondary">Cancel</button>
                <button id="confirmThumb" class="btn primary">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Edit Link Modal -->
    <div id="editModal" class="modal-overlay hidden">
        <div class="modal-content border-panel">
            <h2>Edit Record</h2>
            <div class="edit-fields">
                <div class="field">
                    <label>Title</label>
                    <input type="text" id="editTitle" placeholder="Title">
                </div>
                <div class="field">
                    <label>Description</label>
                    <textarea id="editDesc" placeholder="Description"></textarea>
                </div>
                <div class="thumbnail-section">
                    <label>Thumbnail</label>
                    <div id="editThumbPicker" class="thumb-picker"></div>
                    <div class="screenshot-tools">
                        <h3>Refresh Screenshot</h3>
                        <div class="crop-presets">
                            <button class="btn tiny active" data-crop="600">Full</button>
                            <button class="btn tiny" data-crop="400">Wide</button>
                            <button class="btn tiny" data-crop="300">Square</button>
                        </div>
                        <button id="genScreenshotBtn" class="btn secondary small">Fetch screenshot</button>
                    </div>
                </div>
            </div>
            <div class="modal-actions">
                <button id="closeEditModal" class="btn secondary">Cancel</button>
                <button id="saveEditBtn" class="btn primary">Save</button>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div id="shareModal" class="modal-overlay hidden">
        <div class="modal-content border-panel text-center">
            <h2>P2P Share</h2>
            <p class="modal-subtitle">Share this 6-digit sync code:</p>
            <div id="shareCodeOutput" class="share-code mono">000000</div>
            <div id="shareStatus" class="status-msg waiting">Waiting...</div>
            <div class="modal-actions centered mt-4">
                <button id="closeShareModal" class="btn primary">Close Connection</button>
            </div>
        </div>
    </div>

    <!-- Import Modal -->
    <div id="importModal" class="modal-overlay hidden">
        <div class="modal-content border-panel text-center">
            <h2>Import Data</h2>
            <p class="modal-subtitle">Enter the 6-digit peer code.</p>
            <div class="input-centered">
                <input type="text" id="importCodeInput" class="large-code-input mono" maxlength="6"
                    placeholder="000000">
            </div>
            <div id="importStatus" class="status-msg"></div>
            <div class="modal-actions centered">
                <button id="closeImportModal" class="btn secondary">Cancel</button>
                <button id="confirmImport" class="btn primary">Connect</button>
            </div>
        </div>
    </div>

    <!-- Backup Modal -->
    <div id="backupModal" class="modal-overlay hidden">
        <div class="modal-content border-panel">
            <h2>Data Backup</h2>
            <div class="tabs">
                <button id="showExportBtn" class="tab-btn active">Export View</button>
                <button id="showImportBtn" class="tab-btn">Import View</button>
            </div>

            <div id="exportArea" class="backup-section">
                <textarea id="exportCode" readonly class="mono" placeholder="Data JSON..."></textarea>
                <button id="copyCodeBtn" class="btn primary full-width mt-3">Copy to Clipboard</button>
            </div>

            <div id="importArea" class="backup-section hidden">
                <textarea id="localImportCodeInput" class="mono" placeholder='[{"url":"..."}]'></textarea>
                <p id="importError" class="status-text error hidden">Invalid format</p>
                <button id="importSubmitBtn" class="btn primary full-width mt-3">Restore</button>
            </div>

            <div class="modal-actions mt-4">
                <button id="closeBackupModal" class="btn secondary">Close</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
